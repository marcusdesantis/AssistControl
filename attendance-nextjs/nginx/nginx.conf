## Docker DNS resolver — re-resolve upstream IPs on every request (no stale IPs)
resolver 127.0.0.11 valid=10s ipv6=off;

map $status $service_unavailable {
  503 1;
  502 1;
  504 1;
  default 0;
}

map $request_method $cors_method {
  OPTIONS 1;
  default 0;
}

server {
  listen 80;

  proxy_intercept_errors on;
  error_page 502 503 504 = @service_unavailable;

  location @service_unavailable {
    default_type application/json;
    add_header Access-Control-Allow-Origin  $http_origin always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, X-App-Base-Url" always;
    add_header Access-Control-Allow-Credentials "true" always;
    return 503 '{"success":false,"message":"Servicio temporalmente no disponible. Intente en unos momentos.","errorCode":"SERVICE_UNAVAILABLE"}';
  }

  # ── CORS global ──────────────────────────────────────────────────────────────
  proxy_hide_header access-control-allow-origin;
  proxy_hide_header access-control-allow-methods;
  proxy_hide_header access-control-allow-headers;
  proxy_hide_header access-control-allow-credentials;

  add_header Access-Control-Allow-Origin  $http_origin always;
  add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
  add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, X-App-Base-Url" always;
  add_header Access-Control-Allow-Credentials "true" always;

  if ($request_method = OPTIONS) {
    return 204;
  }

  # ── svc-core ─────────────────────────────────────────────────────────────────
  location ~ ^/api/v1/(auth|company|settings|public|notifications) {
    set $upstream svc-core:3001;
    proxy_pass         http://$upstream;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_read_timeout 30s;
  }

  # ── svc-employees ────────────────────────────────────────────────────────────
  location ~ ^/api/v1/(employees|departments|positions) {
    set $upstream svc-employees:3002;
    proxy_pass         http://$upstream;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_read_timeout 30s;
  }

  # ── svc-attendance ───────────────────────────────────────────────────────────
  location ~ ^/api/v1/(attendance|schedules) {
    set $upstream svc-attendance:3003;
    proxy_pass         http://$upstream;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_read_timeout 30s;
  }

  # ── svc-analytics ────────────────────────────────────────────────────────────
  location ~ ^/api/v1/(dashboard|reports) {
    set $upstream svc-analytics:3004;
    proxy_pass         http://$upstream;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_read_timeout 60s;
  }

  # ── svc-mobile ───────────────────────────────────────────────────────────────
  location ~ ^/api/v1/(mobile|checker) {
    set $upstream svc-mobile:3005;
    proxy_pass         http://$upstream;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_read_timeout 30s;
  }

  # ── svc-comms ────────────────────────────────────────────────────────────────
  location ~ ^/api/v1/messages {
    set $upstream svc-comms:3006;
    proxy_pass         http://$upstream;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_read_timeout 30s;
  }

  # ── svc-billing ──────────────────────────────────────────────────────────────
  location ~ ^/api/v1/(billing|plans|subscription|invoices|payment-methods|webhook|payment) {
    set $upstream svc-billing:3007;
    proxy_pass         http://$upstream;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_read_timeout 30s;
  }

  # ── svc-admin ────────────────────────────────────────────────────────────────
  location ~ ^/api/v1/admin {
    set $upstream svc-admin:3008;
    proxy_pass         http://$upstream;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_read_timeout 30s;
  }

  # ── API Docs (Swagger UI) ────────────────────────────────────────────────────
  location = /docs {
    root /etc/nginx/docs;
    try_files /index.html =404;
    add_header Cache-Control "no-cache";
  }

  location = /api-spec.json {
    root /etc/nginx/docs;
    add_header Content-Type "application/json; charset=utf-8";
    add_header Access-Control-Allow-Origin "*";
    add_header Cache-Control "no-cache";
  }

  # ── health ───────────────────────────────────────────────────────────────────
  location /health {
    default_type application/json;
    return 200 '{"status":"ok"}';
  }
}
