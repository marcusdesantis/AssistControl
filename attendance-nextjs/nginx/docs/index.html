<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AssistControl — API Docs</title>
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; }

    #topbar {
      background: #1a1a2e;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    #topbar h1 {
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    #topbar span {
      color: #6c757d;
      font-size: 13px;
    }
    #topbar .badge {
      background: #0d6efd;
      color: #fff;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
    }

    #swagger-ui .topbar { display: none !important; }
    #swagger-ui .info { padding: 16px 24px 0; }

    .service-filter {
      margin-left: auto;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .service-filter label {
      color: #adb5bd;
      font-size: 12px;
      margin-right: 4px;
    }
    .filter-btn {
      background: #2d2d4e;
      color: #adb5bd;
      border: 1px solid #3d3d5e;
      padding: 4px 12px;
      border-radius: 16px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn:hover, .filter-btn.active {
      background: #0d6efd;
      color: #fff;
      border-color: #0d6efd;
    }
  </style>
</head>
<body>

<div id="topbar">
  <h1>AssistControl</h1>
  <span class="badge">API v1</span>
  <span>6 microservicios · Next.js</span>
</div>

<div id="swagger-ui"></div>

<script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
<script>
  window.onload = function () {
    SwaggerUIBundle({
      url: '/api-spec.json',
      dom_id: '#swagger-ui',
      deepLinking: true,
      presets: [
        SwaggerUIBundle.presets.apis,
        SwaggerUIBundle.SwaggerUIStandalonePreset,
      ],
      layout: 'BaseLayout',
      persistAuthorization: true,
      filter: true,
      displayRequestDuration: true,
      tryItOutEnabled: true,
      requestInterceptor: function (req) {
        // Auto-strip trailing slash issues
        return req;
      },
    });
  };
</script>
</body>
</html>
