server {
    listen 80;
    server_name tiempoya.net www.tiempoya.net;
    return 301 https://www.tiempoya.net$request_uri;
}

server {
    listen 80;
    server_name ci.tiempoya.net;
    return 301 https://ci.tiempoya.net$request_uri;
}

server {
    listen 443 ssl;
    server_name ci.tiempoya.net;

    ssl_certificate     /etc/letsencrypt/live/ci.tiempoya.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ci.tiempoya.net/privkey.pem;

    location / {
        proxy_pass         http://host.docker.internal:9090;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 90s;
    }
}

server {
    listen 443 ssl;
    server_name tiempoya.net;

    ssl_certificate     /etc/letsencrypt/live/tiempoya.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tiempoya.net/privkey.pem;

    return 301 https://www.tiempoya.net$request_uri;
}

server {
    listen 443 ssl;
    server_name www.tiempoya.net;

    ssl_certificate     /etc/letsencrypt/live/tiempoya.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tiempoya.net/privkey.pem;

    # Landing page → attendance-nextjs nginx
    location = / {
        proxy_pass       http://host.docker.internal:8080;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location ^~ /precios {
        proxy_pass       http://host.docker.internal:8080;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location ^~ /landing/ {
        proxy_pass       http://host.docker.internal:8080;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location ^~ /control-asistencia {
        proxy_pass       http://host.docker.internal:8080;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location ^~ /asistencia-laboral {
        proxy_pass       http://host.docker.internal:8080;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location ^~ /huella-biometrica {
        proxy_pass       http://host.docker.internal:8080;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location ^~ /account-deletion {
        proxy_pass       http://host.docker.internal:8080;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location ^~ /_next/ {
        proxy_pass       http://host.docker.internal:8080;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SEO: sitemap y robots
    location = /sitemap.xml {
        proxy_pass       http://host.docker.internal:8080;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /robots.txt {
        proxy_pass       http://host.docker.internal:8080;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SSE: soporte tenant y superadmin
    # Nota: usa ~ (regex) que tiene prioridad sobre el prefijo /api/ sin ^~
    location ~ ^/api/v1/(admin/)?support/tickets/[^/]+/events {
        proxy_pass             http://host.docker.internal:8080;
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_buffering        off;
        proxy_cache            off;
        proxy_read_timeout     3600s;
        chunked_transfer_encoding on;
    }

    # API → attendance-nextjs nginx (sin ^~ para que los bloques ~ regex tengan prioridad)
    location /api/ {
        proxy_pass       http://host.docker.internal:8080;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # SPA frontend
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }
}