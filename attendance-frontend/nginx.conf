server {
    listen 80;
    server_name tiempoya.net www.tiempoya.net;
    return 301 https://www.tiempoya.net$request_uri;
}

server {
    listen 443 ssl;
    server_name tiempoya.net;

    ssl_certificate     /etc/letsencrypt/live/tiempoya.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tiempoya.net/privkey.pem;

    return 301 https://www.tiempoya.net$request_uri;
}

server {
    listen 443 ssl;
    server_name www.tiempoya.net;

    ssl_certificate     /etc/letsencrypt/live/tiempoya.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tiempoya.net/privkey.pem;

    # Landing page → attendance-nextjs nginx
    location = / {
        proxy_pass       http://host.docker.internal:8080;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location ^~ /precios {
        proxy_pass       http://host.docker.internal:8080;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location ^~ /_next/ {
        proxy_pass       http://host.docker.internal:8080;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # API → attendance-nextjs nginx
    location ^~ /api/ {
        proxy_pass       http://host.docker.internal:8080;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # SPA frontend
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }
}