<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 52" fill="none">
  <!-- Isotipo mark — white version -->
  <!-- Top horizontal bar -->
  <rect x="3" y="3" width="33" height="11" rx="1.5" fill="white"/>
  <!-- Left vertical column -->
  <rect x="3" y="3" width="11" height="46" rx="1.5" fill="white"/>
  <!-- Center stem -->
  <rect x="20" y="20" width="9" height="29" rx="1.5" fill="white"/>
  <!-- Teal checkmark -->
  <polyline points="22,6 37,31 58,2" stroke="#00D9AE" stroke-width="10" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- "TiempoYa" text -->
  <text x="74" y="38" font-family="Inter,Helvetica Neue,Arial,sans-serif" font-size="25" fill="white" font-weight="600" letter-spacing="-0.3">Tiempo</text>
  <text x="196" y="38" font-family="Inter,Helvetica Neue,Arial,sans-serif" font-size="25" fill="white" font-weight="800" letter-spacing="-0.3">Ya</text>
</svg>
